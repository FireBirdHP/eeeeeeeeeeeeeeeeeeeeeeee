name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force

          netsh advfirewall firewall delete rule name="RDP-Open"
          netsh advfirewall firewall add rule name="RDP-Open" dir=in action=allow protocol=TCP localport=3389

          Restart-Service -Name TermService -Force

      - name: Create RDP User with Secure Password
        run: |
          Add-Type -AssemblyName System.Security

          $chars = @()
          $chars += [char[]](65..90) | Get-Random -Count 4
          $chars += [char[]](97..122) | Get-Random -Count 4
          $chars += [char[]](48..57) | Get-Random -Count 4
          $chars += ([char[]](33..47)+[char[]](58..64)+[char[]](91..96)+[char[]](123..126)) | Get-Random -Count 4

          $password = -join ($chars | Sort-Object {Get-Random})

          $secure = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $secure -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

      - name: Download Chisel
        run: |
          $url = "https://github.com/jpillora/chisel/releases/download/v1.11.5/chisel_1.11.5_windows_amd64.zip"
          $zip = "$env:TEMP\chisel.zip"

          Invoke-WebRequest $url -OutFile $zip
          Expand-Archive $zip -DestinationPath "$env:TEMP\chisel"
          Remove-Item $zip

      - name: Generate Random Port
        run: |
          $port = Get-Random -Minimum 20000 -Maximum 60000
          echo "CHISEL_PORT=$port" >> $env:GITHUB_ENV

      - name: Start Chisel Tunnel
        run: |
          $chisel = Get-ChildItem "$env:TEMP\chisel" -Recurse -Filter chisel.exe | Select-Object -First 1

          Start-Process $chisel.FullName `
            -ArgumentList "client plsmeow.nya.pub R:$env:CHISEL_PORT`:127.0.0.1:3389"

      - name: Show RDP Info
        run: |
          Write-Host ""
          Write-Host "====== RDP ACCESS ======"
          Write-Host "Server: plsmeow.nya.pub"
          Write-Host "Port: $env:CHISEL_PORT"
          Write-Host "User: RDP"
          Write-Host "Password: $env:RDP_PASSWORD"
          Write-Host "========================"
          Write-Host ""

      - name: Keep Runner Alive
        run: |
          while ($true) {
            Write-Host "RDP session active..."
            Start-Sleep -Seconds 300
          }
